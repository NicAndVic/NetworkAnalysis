[firewall]
ha = true
nodes = FW-A, FW-B
model = PA-3220
sync_link = true
disable_core_redundancy = false

[isp:PrimaryISP]
circuit_id = PRI-100
speed = 10G
media = fiber

[isp:BackupISP]
circuit_id = BAK-010
speed = 1G
media = copper

[cloud:AWS-Prod]
provider = AWS
direct_to_firewall = false

[cloud:Azure-DR]
provider = Azure
direct_to_firewall = false

[cloud:Other-SaaS]
provider = Other
direct_to_firewall = false
