[firewall]
ha=true
nodes=FW-A,FW-B
model=Fortigate-200F
role_1=active
role_2=standby
sync_link=true

[isp:ISP-A]
circuit_id=CIR-100
media=fiber
speed=10G

[isp:ISP-B]
circuit_id=CIR-200
media=fiber
speed=1G

[cloud:AWS-Prod]
provider=AWS
direct_to_firewall=false

[cloud:Azure-DR]
provider=Azure
direct_to_firewall=false

[cloud:Other-SaaS]
provider=Other
direct_to_firewall=false
