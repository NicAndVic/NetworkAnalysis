<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Network Diagram Generator</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 16px; background: #f8fafc; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
    .card { background:#fff; border:1px solid #cbd5e1; border-radius:8px; padding:12px; }
    .row { margin:8px 0; display:block; }
    .export { margin-top:16px; }
    iframe { width:100%; height:520px; border:1px solid #94a3b8; background:#fff; margin-top: 12px; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const e = React.createElement;
function App(){
  const [files, setFiles] = React.useState({});
  const [filters, setFilters] = React.useState({servers:true, aps:true, aws:true, azure:true, other:true, paginate:false, fit:false});
  const [status, setStatus] = React.useState({loaded:false, stale:false});
  const [svg, setSvg] = React.useState('');

  async function refreshStatus(){
    const r = await fetch('/api/status');
    setStatus(await r.json());
  }
  React.useEffect(()=>{ refreshStatus(); },[]);

  function markStale(next){
    setFilters(next);
    if(status.loaded){
      setStatus({...status, stale:true});
    }
  }

  async function ingestBundle(){
    const fd = new FormData();
    fd.append('zip_file', files.zip);
    fd.append('ini_file', files.ini);
    if(files.excel) fd.append('excel_file', files.excel);
    await fetch('/api/ingest/bundle',{method:'POST', body:fd});
    await refreshStatus();
    alert('Ingest complete');
  }

  async function exp(kind){
    const fd = new FormData();
    fd.append('include_servers', filters.servers);
    fd.append('include_aps', filters.aps);
    fd.append('include_aws', filters.aws);
    fd.append('include_azure', filters.azure);
    fd.append('include_other_cloud', filters.other);
    fd.append('paginate', filters.paginate);
    fd.append('fit_to_page', filters.fit);
    const r = await fetch('/api/export/'+kind,{method:'POST', body:fd});
    const blob = await r.blob();
    if(kind==='svg'){ setSvg(URL.createObjectURL(blob)); }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'diagram.' + kind;
    a.click();
    await refreshStatus();
  }

  const setFile = (k,ev)=>setFiles({...files,[k]:ev.target.files[0]});

  return e('div',null,
    e('h1',null,'Network Diagram Generator'),
    e('div',{className:'grid'},
      e('div',{className:'card'},
        e('h3',null,'Ingest'),
        e('label',{className:'row'},'ZIP switch exports: ',e('input',{type:'file',onChange:(ev)=>setFile('zip',ev)})),
        e('label',{className:'row'},'INI edge template: ',e('input',{type:'file',onChange:(ev)=>setFile('ini',ev)})),
        e('label',{className:'row'},'Excel (optional): ',e('input',{type:'file',onChange:(ev)=>setFile('excel',ev)})),
        e('button',{onClick:ingestBundle,disabled:!files.zip||!files.ini},'Ingest Bundle')
      ),
      e('div',{className:'card'},
        e('h3',null,'Filters'),
        e('label',{className:'row'},e('input',{type:'checkbox',checked:filters.servers,onChange:(ev)=>markStale({...filters,servers:ev.target.checked})}),' include servers'),
        e('label',{className:'row'},e('input',{type:'checkbox',checked:filters.aps,onChange:(ev)=>markStale({...filters,aps:ev.target.checked})}),' include access points'),
        e('label',{className:'row'},e('input',{type:'checkbox',checked:filters.aws,onChange:(ev)=>markStale({...filters,aws:ev.target.checked})}),' include AWS'),
        e('label',{className:'row'},e('input',{type:'checkbox',checked:filters.azure,onChange:(ev)=>markStale({...filters,azure:ev.target.checked})}),' include Azure'),
        e('label',{className:'row'},e('input',{type:'checkbox',checked:filters.other,onChange:(ev)=>markStale({...filters,other:ev.target.checked})}),' include Other cloud provider'),
        e('h4',null,'Pagination'),
        e('label',{className:'row'},e('input',{type:'checkbox',checked:filters.paginate,onChange:(ev)=>markStale({...filters,paginate:ev.target.checked})}),' Paginate'),
        e('label',{className:'row'},e('input',{type:'checkbox',checked:filters.fit,onChange:(ev)=>markStale({...filters,fit:ev.target.checked})}),' Fit to page')
      )
    ),
    e('div',{className:'card export'},
      e('h3',null,'Export'),
      status.stale
        ? e('p',{style:{color:'#b45309'}},'Export stale: filters changed after ingest. Re-export without re-ingest is supported.')
        : e('p',{style:{color:'#15803d'}},'Export up to date.'),
      e('button',{onClick:()=>exp('svg'),disabled:!status.loaded},'Export SVG'),' ',
      e('button',{onClick:()=>exp('pdf'),disabled:!status.loaded},'Export PDF')
    ),
    svg ? e('iframe',{src:svg}) : null
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
